# =========================
# Input Sources
# =========================
source_file: ../input/accuracy-new/main.cu
summaries_config: ./config/accuracy_ia_gpt5_summaries.json

# =========================
# Model + Run Identity
# =========================
llm: "meta-llama/Llama-2-7b-hf"
llm_backend: "zkllm"
name: accuracy_ia_zkllm
app_name: accuracy-cuda-zkllm

# =========================
# zkLLM Settings
# =========================
zkllm_model_size: 7
zkllm_seq_len: 2048
zkllm_max_new_tokens: 512
zkllm_dir: "../zkllm"
zkllm_proof_dir: "../zkllm_proofs"

# =========================
# Output Paths
# =========================
output_dir: ./results/accuracy-zkllm
output_file: ./results_zkllm.csv

# =========================
# Build / Auto-Fix Loop
# =========================
build_fix_iterations: 3
build_out_file: build.out
build_err_file: build.err
build_error_summary_lines: 80
build_error_summary_chars: 8000
